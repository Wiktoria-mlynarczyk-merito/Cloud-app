version: "3.9"

services:

  frontend:
    image: nginx
    container_name: frontend
    ports:
      - "3000:80"

  backend:
    image: node
    container_name: backend
    ports:
      - "5000:5000"

  db:
    image: postgres
    container_name: database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cloudapp
    ports:
      - "5432:5432"